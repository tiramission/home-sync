# home-sync 配置文件示例
# 将此文件复制为 config.toml 并根据需要修改

# Scoop 软件包声明
[scoop]
# Scoop buckets（软件源）
# 每个 bucket 可以是简单的名称字符串，也可以是 {name, source} 对来指定自定义源
buckets = [
    "main",
    "extras",
    "versions",
    "nerd-fonts",
    # 自定义 bucket 示例：
    # { name = "my-bucket", source = "https://github.com/user/my-bucket" },
]

# 要安装的软件包列表
# 每个包可以是简单的名称字符串，也可以是 {name, bucket} 对来指定 bucket 来源
packages = [
    "git",
    "7zip",
    "curl",
    "ripgrep",
    "fd",
    "bat",
    "eza",
    "starship",
    "neovim",
    "nodejs-lts",
    "python",
    "rustup",
    "vscode",
    "windows-terminal",
    "powertoys",
    "everything",
    "ditto",
    "flow-launcher",
    # 指定 bucket 来源的包示例：
    # { name = "zig", bucket = "main" },
    # { name = "my-tool", bucket = "my-bucket" },
]

# Dotfiles 声明
# 每个条目定义一个文件同步映射
#
# 字段说明：
#   source:   仓库中的文件路径（相对于本项目根目录）
#   target:   目标路径（根据 type 决定如何解析）
#   type:     "file"（默认）或 "persist"
#     - file:    target 为绝对路径，支持 ~ 展开
#     - persist: target 为相对于 ~/scoop/persist/ 的路径
#   behavior: "copy"（默认）或 "merge"
#     - copy:  复制文件到目标路径，内容不同时备份并覆写
#     - merge: 深度合并文件内容（需要指定 format）
#   format:   合并格式，behavior = "merge" 时必填
#     - json:  JSON 深度合并（对象递归合并，数组/标量源覆盖目标）
#     - yaml:  YAML 深度合并（同 JSON 语义）

# 默认 type = "file"，behavior = "copy"，均可省略
[[dotfiles]]
source = "dotfiles/.gitconfig"
target = "~/.gitconfig"

[[dotfiles]]
source = "dotfiles/.bashrc"
target = "~/.bashrc"

[[dotfiles]]
source = "dotfiles/settings.json"
target = "~/AppData/Roaming/Code/User/settings.json"

[[dotfiles]]
source = "dotfiles/terminal-settings.json"
target = "~/AppData/Local/Packages/Microsoft.WindowsTerminal_8wekyb3d8bbwe/LocalState/settings.json"

[[dotfiles]]
source = "dotfiles/starship.toml"
target = "~/.config/starship.toml"

# 使用 merge 行为深度合并 JSON 文件
# [[dotfiles]]
# source = "dotfiles/settings-partial.json"
# target = "~/AppData/Roaming/Code/User/settings.json"
# behavior = "merge"
# format = "json"

# 使用 merge 行为深度合并 YAML 文件
# [[dotfiles]]
# source = "dotfiles/config-partial.yaml"
# target = "~/.config/some-app/config.yaml"
# behavior = "merge"
# format = "yaml"

# Scoop persist 示例
# type = "persist" 将文件链接到 ~/scoop/persist/<target>
# Scoop 更新应用时不会覆盖 persist 目录中的文件
#
# [[dotfiles]]
# source = "dotfiles/mihomo/config.yaml"
# target = "mihomo/config.yaml"
# type = "persist"
#   → 链接到 ~/scoop/persist/mihomo/config.yaml
#
# [[dotfiles]]
# source = "dotfiles/neovim/init.lua"
# target = "neovim/init.lua"
# type = "persist"
#   → 链接到 ~/scoop/persist/neovim/init.lua
